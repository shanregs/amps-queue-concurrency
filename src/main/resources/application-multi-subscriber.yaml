spring:
  datasource:
    url: jdbc:h2:file:./data/amps-multi;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      pool-name: HikariPool-MultiSub
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000

amps:
  consumer:
    subscriber-count: 3
    max-concurrency-per-subscriber: 50
