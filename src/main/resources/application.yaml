spring:
  application:
    name: amps-queue-concurrency

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

amps:
  server:
    uri: tcp://172.21.12.69:9007/amps/json   # external AMPS server; override with AMPS_SERVER_URI env var
  queue:
    topic: /queue/trades
    filter: ""
    lease-timeout-ms: 5000
  consumer:
    max-retries: 3
    retry-db-tracking-enabled: true   # true → persist FAILED/DISCARDED rows + retry count to DB
                                      # false → track retries in-memory only (no FAILED rows written)
                                      # In both cases, exhausted retries → log ERROR + discard (ACK)
                                      # Note: false is NOT safe for multi-jvm-subscriber (restarts reset counters)
    shutdown-timeout-ms: 30000
