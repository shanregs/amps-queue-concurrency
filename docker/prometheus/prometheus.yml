global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: docker-dev

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  # ── Spring Boot Actuator (all app instances) ──────────────────────────────
  # Targets use container-internal port 8080, not the host-mapped ports.
  # Host mappings (8080/8081/8082/8083) are for external access only.
  - job_name: 'amps-queue-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'app-publisher:8080'
          - 'app-multi-jvm:8080'
          - 'amps-multi-jvm-sub2:8080'
        labels:
          application: 'amps-queue-concurrency'
      # Targets below are optional — only UP when those profiles are running
      - targets:
          - 'app-single:8080'
          - 'app-multi:8080'
        labels:
          application: 'amps-queue-concurrency'
          optional: 'true'

  # ── AMPS Admin (if prometheus exporter is enabled) ────────────────────────
  # AMPS does not expose Prometheus natively; metrics come via Spring Actuator.
  # Uncomment if you add a custom AMPS → Prometheus bridge.
  # - job_name: 'amps-server'
  #   static_configs:
  #     - targets: ['amps:8085']

  # ── Prometheus self-scrape ────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
